# Render Blueprint — deploys the whole site (Guide + Wiki + Map) as one Docker
# web service. Render reads this file automatically when you create a Blueprint.
#
# Free tier: no persistent disk, so the map uses the planning.sqlite that ships
# in the image. To refresh map data, re-run the importer locally and commit the
# updated dashboard/data/planning.sqlite (see DEPLOY.md), or upgrade to a paid
# instance + disk + cron for automatic daily refresh (commented block below).

services:
  - type: web
    name: gloucestershire-planning
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /map
    autoDeploy: true

