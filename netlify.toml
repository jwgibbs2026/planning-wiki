# Netlify build config for the fully static site (Guide + Wiki + Map).
#
# Builds the Quartz wiki, then assembles everything into ./dist, which Netlify
# publishes. No server required.

[build]
  # Invoke the Quartz CLI via `node` (not `npx quartz`) so the build doesn't
  # depend on the bin's executable bit, which Netlify's runner doesn't always
  # preserve (caused a "quartz: Permission denied" build failure).
  command = "cd wiki-src && npm ci && node ./quartz/bootstrap-cli.mjs plugin install && node ./quartz/bootstrap-cli.mjs build && cd .. && node build-static.mjs"
  publish = "dist"

[build.environment]
  # Quartz requires Node 22+.
  NODE_VERSION = "22"
